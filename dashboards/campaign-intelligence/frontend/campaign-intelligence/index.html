<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Intelligence — LLYC</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#081522;color:#F0F4F8;font-family:'Montserrat',sans-serif;height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{text-align:center;display:flex;flex-direction:column;align-items:center;gap:32px;padding:40px}
.logo{font-size:24px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:center;gap:10px}
.dot{width:8px;height:8px;border-radius:50%;background:#F54963;animation:breathe 2.5s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.35;transform:scale(0.6)}}
.back{font-family:'DM Mono',monospace;font-size:10px;color:#5a7a8a;letter-spacing:0.5px;text-decoration:none;transition:color 0.15s}
.back:hover{color:#36A7B7}
.card{background:#0d1f2d;border:1px solid rgba(54,167,183,0.12);border-radius:12px;padding:36px 40px;max-width:400px;width:100%;display:flex;flex-direction:column;gap:20px}
.card-title{font-size:15px;font-weight:600}
.card-sub{font-size:12px;color:#5a7a8a;line-height:1.6;font-family:'DM Mono',monospace}
.input-wrap{display:flex;flex-direction:column;gap:6px;text-align:left}
.input-label{font-family:'DM Mono',monospace;font-size:9px;color:#5a7a8a;letter-spacing:1px;text-transform:uppercase}
.input-field{background:#122436;border:1px solid rgba(54,167,183,0.2);color:#F0F4F8;padding:10px 14px;border-radius:6px;font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color 0.15s;width:100%}
.input-field:focus{border-color:rgba(54,167,183,0.5)}
.input-field::placeholder{color:#5a7a8a}
.btn-enter{background:#F54963;color:#fff;border:none;padding:12px 24px;border-radius:6px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.15s;width:100%}
.btn-enter:hover{background:#36A7B7}
.error{color:#f97b2e;font-size:11px;font-family:'DM Mono',monospace;display:none}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/">← Volver al inicio</a>
  <div class="logo">
    <div class="dot"></div>
    Campaign <span style="color:#F54963;font-weight:300"> Intelligence</span>
  </div>
  <div class="card">
    <div class="card-title">Accede a tu dashboard</div>
    <div class="card-sub">Introduce el código de acceso que te ha proporcionado tu equipo de LLYC.</div>
    <div class="input-wrap">
      <span class="input-label">Código de cliente</span>
      <input class="input-field" id="tenantInput" type="text" placeholder="ej: lcdc" autocomplete="off" onkeydown="if(event.key==='Enter')goToDashboard()">
    </div>
    <div class="error" id="errorMsg"></div>
    <button class="btn-enter" onclick="goToDashboard()">Entrar →</button>
  </div>
</div>
<script>
function goToDashboard(){
  const tenant = document.getElementById('tenantInput').value.trim().toLowerCase();
  if(!tenant){
    const err = document.getElementById('errorMsg');
    err.textContent = 'Introduce tu código de cliente.';
    err.style.display = 'block';
    return;
  }
  window.location.href = `/campaign-intelligence/?tenant_id=${encodeURIComponent(tenant)}`;
}
</script>
</body>
</html>
