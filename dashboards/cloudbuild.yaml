# ================================================================
# Cloud Build — Campaign Intelligence Dashboard
# Path-scoped trigger: solo se ejecuta cuando hay cambios en dashboards/**
# Deploy independiente del agent-executor (main trigger)
# ================================================================

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-dashboard-api'
    entrypoint: gcloud
    args:
      - functions
      - deploy
      - campaign-intelligence-api
      - --gen2
      - --runtime=python311
      - --region=europe-west1
      - --source=dashboards/campaign-intelligence/api
      - --entry-point=dashboard_api
      - --trigger-http
      - --allow-unauthenticated
      - --memory=512MB
      - --timeout=120s
      - --service-account=dashboards-sa@llyc-ai-first-core.iam.gserviceaccount.com
      - --set-env-vars=GCP_CLIENT_PROJECT=llyc-prj-lcdlc-datamart,BQ_DATASET=ODS,TENANT_ID=lacasadelascarcasas,CLIENT_SECRET_PROJECT=llyc-ai-lcdc

# Solo se activa cuando hay cambios en dashboards/**
# El trigger del agent-executor usa includedFiles: ['**'] excepto dashboards/
includedFiles:
  - 'dashboards/**'

options:
  logging: CLOUD_LOGGING_ONLY
